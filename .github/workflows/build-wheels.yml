name: Build and publish wheels

on:
  push:
    tags:
      - 'v*'  # Build on version tags like v1.0.3
  workflow_dispatch:  # Allow manual builds from GitHub UI

jobs:
  build_wheels_cpu:
    name: Build CPU wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.10'

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++ make libomp-dev
        python -m pip install --upgrade pip
        pip install build wheel auditwheel
    
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install libomp
        python -m pip install --upgrade pip
        pip install build wheel
    
    # scikit-build-core intercepts this command, invokes CMake,
    # detects no CUDA is present, and compiles the CPU OpenMP binary.
    - name: Build wheel
      run: python -m build --wheel
    
    # Converts generic linux_x86_64 tag into PyPI-acceptable manylinux
    # and fixes external dynamic linkages natively.
    - name: Repair Linux Wheel (Auditwheel)
      if: runner.os == 'Linux'
      run: |
        mkdir repaired_dist
        auditwheel repair dist/*.whl --plat manylinux_2_28_x86_64 -w repaired_dist/
        rm -rf dist/*.whl
        mv repaired_dist/*.whl dist/

    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./dist/*.whl
    
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags/')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        pip install twine
        twine upload dist/*.whl --skip-existing

  build_wheels_gpu:
    name: Build GPU wheels (CUDA Fat Wheel)
    runs-on: ubuntu-latest
    container: nvidia/cuda:11.8.0-devel-ubuntu22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y python3 python3-pip make gcc g++ git patchelf
        python3 -m pip install --upgrade pip build wheel auditwheel
    
    # inside this container, CMake finds CUDA automatically.
    # It will generate BOTH beamform_cpu.so and beamform_gpu.so 
    # and wrap them together in a unified "Fat Wheel".
    - name: Build Fat Wheel
      run: python3 -m build --wheel
    
    # Auditwheel bundles internal CUDA dependencies if needed 
    # and safely changes the platform tag to manylinux
    - name: Repair GPU Wheel (Auditwheel)
      run: |
        mkdir repaired_dist
        auditwheel repair dist/*.whl --plat manylinux_2_28_x86_64 -w repaired_dist/
        rm -rf dist/*.whl
        mv repaired_dist/*.whl dist/
    
    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-gpu
        path: ./dist/*.whl
    
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags/')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python3 -m pip install twine
        twine upload dist/*.whl --skip-existing

  build_source_dist:
    name: Build source distribution
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    
    - name: Build source distribution
      run: python -m build --sdist
    
    - name: Upload source distribution
      uses: actions/upload-artifact@v4
      with:
        name: source-dist
        path: ./dist/*.tar.gz
    
    - name: Publish source dist to PyPI
      if: startsWith(github.ref, 'refs/tags/')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        pip install twine
        twine upload dist/*.tar.gz --skip-existing