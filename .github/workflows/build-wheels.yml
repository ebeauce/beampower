name: Build and publish wheels

on:
  push:
    tags:
      - 'v*'  # Build on version tags like v1.0.3
  workflow_dispatch:  # Allow manual builds from GitHub UI

jobs:
  build_wheels_cpu:
    name: Build CPU wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.10'

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++ make libomp-dev
        python -m pip install --upgrade pip
        pip install build wheel auditwheel
    
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install libomp
        python -m pip install --upgrade pip
        pip install build wheel
    
    - name: Build wheel (macOS with OpenMP)
      if: runner.os == 'macOS'
      run: |
        python -m build --wheel \
          -Ccmake.args="-DOpenMP_C_FLAGS=-Xpreprocessor -fopenmp;-DOpenMP_C_LIB_NAMES=omp;-DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib;-DOpenMP_C_INCLUDE_DIR=$(brew --prefix libomp)/include"
    
    - name: Build wheel (Linux with OpenMP)
      if: runner.os == 'Linux'
      run: python -m build --wheel

    - name: Repair Linux Wheel (Auditwheel)
      if: runner.os == 'Linux'
      run: |
        mkdir repaired_dist
        auditwheel repair dist/*.whl --plat manylinux_2_28_x86_64 -w repaired_dist/
        rm -rf dist/*.whl
        mv repaired_dist/*.whl dist/

    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./dist/*.whl

  build_wheels_gpu:
    name: Build GPU wheels (CUDA Fat Wheel)
    runs-on: ubuntu-latest
    # FIX: Use official PyPA image containing aligned older glibc configurations
    container: quay.io/pypa/manylinux_2_28_x86_64:cuda_11.8
    
    steps:
    - uses: actions/checkout@v4
    
    # FIX: PyPA containers bundle distinct optimized Python builds in /opt/python/.
    # This dynamically selects CP310 (Python 3.10) path environment mappings.
    - name: Build Fat Wheel using PyPA Toolchain
      run: |
        /opt/python/cp310-cp310/bin/pip install --upgrade pip build wheel auditwheel
        /opt/python/cp310-cp310/bin/python -m build --wheel
    
    - name: Repair GPU Wheel (Auditwheel)
      run: |
        mkdir repaired_dist
        /opt/python/cp310-cp310/bin/auditwheel repair dist/*.whl --plat manylinux_2_28_x86_64 -w repaired_dist/
        rm -rf dist/*.whl
        mv repaired_dist/*.whl dist/
    
    # Isolate dist file staging area to prevent parallel pollution
    - name: Staging GPU artifacts
      run: |
        mkdir gpu_dist
        mv dist/*.whl gpu_dist/
    
    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-gpu
        path: ./gpu_dist/*.whl

  build_source_dist:
    name: Build source distribution
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    
    - name: Build source distribution
      run: python -m build --sdist
    
    - name: Upload source distribution
      uses: actions/upload-artifact@v4
      with:
        name: source-dist
        path: ./dist/*.tar.gz

  publish_to_pypi:
    name: Publish verified artifacts to PyPI
    needs: [build_wheels_cpu, build_wheels_gpu, build_source_dist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: pypi_dist/
        merge-multiple: true  # Flattens all separate job outputs into one folder
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Publish package distribution to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python -m pip install --upgrade pip twine
        twine upload pypi_dist/* --skip-existing